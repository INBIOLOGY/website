<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages 404 Fallback Redirect to index.html
    const segment = location.pathname.split('/').filter(Boolean).pop();
    if (segment && segment.endsWith('.html')) {
      location.replace(segment);
    } else {
      location.replace('index.html');
    }
  </script>
</head>
<body>
  <p>Redirecting to INBIOLOGY Academy...</p>
</body>
</html>
